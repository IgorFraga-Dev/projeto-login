<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
</head>
<body>
  <main>
    <section id="login">
        <div id="imagem">

        </div>
        <div id="formulário">
            <h1>login</h1>
            <p>Seja bem-vindo(a) novamente. Faça login acesar sua conta e poder fazer as configurações no seu ambiente</p>
            <form action="login.php" method="post" autocomplete="on">
            <div class="campo">
            <span class="material-icons">person</span>
              <input type="e-mail" name="Login" id="ilogin" placeholder="Seu e-mail" autocapitalize="e-mail" required maxlength="30" >
              <label for="ilogin">login</label>
            </div>
            <div class="campo">
              <span class="material-icons">password</span>
              <input type="password" name="password" id="isenha" placeholder="Digite sua senha" autocomplete="current-password" required minlength="8" maxlength="16">
              <label for="isenha">senha</label>
            </div>
            <input type="submit" value="Enviar">
            <a href="esqueci.html" class="botao">
                 Esqueci a Senha <i class="material-icons">mail</i>
            </a>
            
            </form>
        </div>
    </section>
  </main>  
</body>
</html>
